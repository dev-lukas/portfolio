name: Portfolio CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after pushing the image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  portfolio:
    uses: dev-lukas/ci-cd-actions/.github/workflows/node-static.yml@main
    with:
      image_name: portfolio
      node_version: "22"
      smoke_path: /
      deploy: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
      deploy_services: portfolio
    secrets: inherit
