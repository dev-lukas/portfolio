name: Portfolio CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after pushing the image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  portfolio:
    uses: dev-lukas/ci-cd-actions/.github/workflows/node-static.yml@main
    with:
      image_name: portfolio
      node_version: "22"
      test_command: npm test
      smoke_paths: |
        /
        /favicon.svg
    secrets: inherit

  deploy:
    needs: portfolio
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
    uses: dev-lukas/ci-cd-actions/.github/workflows/deploy-service.yml@main
    with:
      deploy_services: portfolio
    secrets: inherit
